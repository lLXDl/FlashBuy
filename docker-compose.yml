version: '3.8'

networks:
  flashbuy-net:
    driver: bridge

services:
  # ==================== 中间件服务 ====================

  mysql:
    image: mysql:8.0
    container_name: flashbuy-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: flashbuy@123
      MYSQL_DATABASE: fastbuy
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - flashbuy-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7.0-alpine
    container_name: flashbuy-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass flashbuy@123
    volumes:
      - ./data/redis:/data
    networks:
      - flashbuy-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: flashbuy-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: flashbuy
      RABBITMQ_DEFAULT_PASS: flashbuy@123
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - flashbuy-net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      timeout: 15s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: flashbuy-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: 'true'
      NACOS_AUTH_TOKEN: flashbuy-nacos-token-123
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
      - ./data/nacos/data:/home/nacos/data
    networks:
      - flashbuy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/health/liveness"]
      timeout: 30s
      interval: 10s
      retries: 20

  # ==================== 业务服务 ====================

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: flashbuy-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - flashbuy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 10s
      interval: 5s
      retries: 3

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: flashbuy-auth
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fastbuy?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: flashbuy@123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: flashbuy@123
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      JWT_SECRET: your-production-jwt-secret-key-at-least-32-characters-long
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - flashbuy-net

  seckill-service:
    build:
      context: ./seckill-service
      dockerfile: Dockerfile
    container_name: flashbuy-seckill
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fastbuy?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: flashbuy@123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: flashbuy@123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: flashbuy
      SPRING_RABBITMQ_PASSWORD: flashbuy@123
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - flashbuy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flashbuy-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - flashbuy-net